version: "3.8"

services:
  # 1. The Database
  postgres:
    image: postgres:15-alpine
    container_name: quiznow_db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: admin # 👈 User
      POSTGRES_PASSWORD: adminpassword # 👈 Password
      POSTGRES_DB: quiznow # 👈 Database Name
    volumes:
      - pg_data:/var/lib/postgresql/data

  # 2. Redis (For Leaderboards)
  redis:
    image: redis:alpine
    container_name: quiznow_redis
    ports:
      - "6379:6379"

volumes:
  pg_data:
